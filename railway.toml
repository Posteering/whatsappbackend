[build]
builder = "dockerfile"

[deploy]
startCommand = "sh -c 'celery -A app.core.celery_app worker --loglevel=info --concurrency=2 & celery -A app.core.celery_app beat --loglevel=info & exec uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
